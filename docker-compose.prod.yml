# Family Memory AI — 프로덕션 스택 (맥 홈서버 + Cloudflare Tunnel)
#
# dev 스택(docker-compose.yml)과 달리:
#  - 앱을 프로덕션 런타임으로 실행(next start / node dist/main.js), NODE_ENV=production
#  - postgres/redis/minio 포트를 호스트에 공개하지 않음(도커 내부망만) — 인터넷 노출 차단
#  - 외부 노출은 cloudflared(아웃바운드 터널)만 → 공유기 포트 개방 불필요
#  - caddy는 내부 리버스 프록시(/v1/*→api, else→web), 공개 포트 없음
#
# 같은 프로젝트명/볼륨을 써서 dev의 데이터(pgdata 등)를 그대로 이어받는다.
# 전환(cutover):
#   docker compose down                       # dev 스택 내리기
#   docker compose -f docker-compose.prod.yml up -d --build
#
# 필요 .env: CLOUDFLARE_TUNNEL_TOKEN, PUBLIC_BASE_URL, NODE_ENV=production,
#            CORS_ORIGIN=$PUBLIC_BASE_URL (자세히는 .env.example)

name: family-memory-ai

# 2026-07-19 운영 검증 이미지. 태그 drift를 막고 의도적인 갱신 때만 digest를 교체한다.
x-image-pins:
  postgres: &postgres-image pgvector/pgvector@sha256:d2ef61f42ef767baa5a1475393303cc235bcd92febd9d7014eddb48b41f3bad0
  redis: &redis-image redis@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
  minio: &minio-image minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
  minio-client: &minio-client-image minio/mc@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727
  caddy: &caddy-image caddy@sha256:5f5c8640aae01df9654968d946d8f1a56c497f1dd5c5cda4cf95ab7c14d58648
  cloudflared: &cloudflared-image cloudflare/cloudflared@sha256:4f6655284ab3d252b7f28fedb19fe6c8fc82ee5b1295c20ac74d475e5398a52d
  # 2026-07-22 관측 스택. digest는 배포·리뷰로 검증한 실행 이미지에서 고정.
  gatus: &gatus-image twinproduction/gatus@sha256:c5f210d095fa78e6efaa20ffeb14803f2ba4f10615e16a6d12087697149617f0             # v5.36.0
  socket-proxy: &socket-proxy-image tecnativa/docker-socket-proxy@sha256:1f3a6f303320723d199d2316a3e82b2e2685d86c275d5e3deeaf182573b47476  # v0.4.2
  dozzle: &dozzle-image amir20/dozzle@sha256:bc1ee4ba8d66c7fc0d03823a78486165fb219809f79eaf54cecf3114d647ab14                     # v10.6.11
  beszel: &beszel-image henrygd/beszel@sha256:a849ad80814b6a1a3be665304dcace5d4854b3bed7bde4dd1227e8ce1b82d477                    # v0.18.7

x-backup-replica-environment: &backup-replica-environment
  RESTIC_REPOSITORY: ${RESTIC_REPOSITORY:-}
  RESTIC_PASSWORD: ${RESTIC_PASSWORD:-}
  RESTIC_REST_USERNAME: ${RESTIC_REST_USERNAME:-}
  RESTIC_REST_PASSWORD: ${RESTIC_REST_PASSWORD:-}
  AWS_ACCESS_KEY_ID: ${RESTIC_AWS_ACCESS_KEY_ID:-}
  AWS_SECRET_ACCESS_KEY: ${RESTIC_AWS_SECRET_ACCESS_KEY:-}
  AWS_DEFAULT_REGION: ${RESTIC_AWS_DEFAULT_REGION:-us-east-1}
  BACKUP_REPLICA_INTERVAL_SECONDS: ${BACKUP_REPLICA_INTERVAL_SECONDS:-86400}
  BACKUP_REPLICA_RETRY_SECONDS: ${BACKUP_REPLICA_RETRY_SECONDS:-300}
  BACKUP_REPLICA_KEEP_DAILY: ${BACKUP_REPLICA_KEEP_DAILY:-30}
  BACKUP_REPLICA_KEEP_WEEKLY: ${BACKUP_REPLICA_KEEP_WEEKLY:-12}
  BACKUP_REPLICA_KEEP_MONTHLY: ${BACKUP_REPLICA_KEEP_MONTHLY:-12}
  BACKUP_REPLICA_CHECK_INTERVAL_DAYS: ${BACKUP_REPLICA_CHECK_INTERVAL_DAYS:-30}

x-app-build: &app-build
  build:
    context: .
    dockerfile: infrastructure/docker/Dockerfile.prod
    args:
      NEXT_PUBLIC_API_URL: ${PUBLIC_BASE_URL:-https://app.subinary.cloud}
      # 같은 오리진 배포 → 공유용 웹 URL도 PUBLIC_BASE_URL과 동일.
      NEXT_PUBLIC_WEB_URL: ${PUBLIC_BASE_URL:-https://app.subinary.cloud}
  image: family-memory-ai/prod:local

# 로그 회전: 기본 json-file 드라이버에 상한을 둔다. 미설정 시 무제한 증가로 CrashLoop 원인 로그가
# 밀려 사라지거나 디스크를 채운다. 상시 서비스에 적용한다(daemon 측 저장이라 read_only 컨테이너에도 안전).
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"
    compress: "true"

services:
  postgres:
    image: *postgres-image
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-family}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-family_memory}
      TZ: ${TZ:-Asia/Seoul}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infrastructure/postgres/init:/docker-entrypoint-initdb.d:ro
    # 포트 미공개: 도커 내부망(api/worker/migrate)에서만 접근
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    logging: *default-logging
    restart: unless-stopped

  redis:
    image: *redis-image
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    logging: *default-logging
    restart: unless-stopped

  minio:
    image: *minio-image
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${STORAGE_ACCESS_KEY:?set in .env}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET_KEY:?set in .env}
    volumes:
      - miniodata:/data
    # 포트 미공개(콘솔 9001 포함). 필요 시 관리용으로만 임시 노출할 것.
    logging: *default-logging
    restart: unless-stopped

  minio-setup:
    image: *minio-client-image
    depends_on:
      minio:
        condition: service_started
    environment:
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-family-memory}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        until mc alias set local http://minio:9000 "$$STORAGE_ACCESS_KEY" "$$STORAGE_SECRET_KEY" >/dev/null 2>&1; do
          echo "minio not ready yet; retrying in 2s..."
          sleep 2
        done
        mc mb --ignore-existing "local/$$STORAGE_BUCKET"
        echo "minio setup complete: bucket ensured"
        exit 0
    restart: "no"

  # PostgreSQL custom dump와 MinIO 객체를 같은 스냅샷 디렉터리에 일일 보관한다.
  # BACKUP_DIR은 도커 볼륨이 아닌 호스트 경로이므로 Time Machine/외장 디스크로 2차 복제가 가능하다.
  backup:
    build:
      context: .
      dockerfile: infrastructure/backup/Dockerfile
    image: family-memory-ai/backup:local
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-family}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-family_memory}
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY:?set in .env}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY:?set in .env}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-family-memory}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
      BACKUP_RETRY_SECONDS: ${BACKUP_RETRY_SECONDS:-300}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
      # dead man's switch(healthchecks.io 등) 핑 URL. 성공 시 URL로, 실패 시 URL/fail로 POST. 미설정 시 무동작.
      HEALTHCHECK_PING_URL: ${HEALTHCHECK_PING_URL:-}
    volumes:
      - type: bind
        source: ${BACKUP_DIR:-./backups}
        target: /backups
    depends_on:
      postgres:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "/usr/local/bin/backup-healthcheck.sh"]
      interval: 5m
      timeout: 10s
      retries: 3
      start_period: 10m
      start_interval: 10s
    logging: *default-logging
    restart: unless-stopped

  # 최신(또는 BACKUP_SNAPSHOT으로 지정한) 스냅샷을 임시 PostgreSQL에 실제 복원한다.
  # 운영 DB에는 연결하지 않으며 프로필을 명시적으로 선택할 때만 실행된다.
  backup-verify:
    build:
      context: .
      dockerfile: infrastructure/backup/Dockerfile
    image: family-memory-ai/backup:local
    command: ["verify"]
    profiles: ["ops"]
    environment:
      STORAGE_BUCKET: ${STORAGE_BUCKET:-family-memory}
      BACKUP_SNAPSHOT: ${BACKUP_SNAPSHOT:-latest}
    volumes:
      - type: bind
        source: ${BACKUP_DIR:-./backups}
        target: /backups
        read_only: true
    tmpfs:
      - /var/lib/postgresql/verify
      - /run/postgresql
    restart: "no"

  # 맥과 다른 장애 도메인의 restic repository로 최신 논리 백업을 암호화 복제한다.
  # profile을 명시해야만 실행되며 RESTIC_REPOSITORY/RESTIC_PASSWORD가 없으면 fail-closed한다.
  backup-replica:
    build:
      context: .
      dockerfile: infrastructure/backup/Dockerfile
    image: family-memory-ai/backup:local
    command: ["replica-daemon"]
    profiles: ["offsite-backup"]
    environment: *backup-replica-environment
    volumes:
      - type: bind
        source: ${BACKUP_DIR:-./backups}
        target: /backups
        read_only: true
      - backup-replica-state:/state
    depends_on:
      backup:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/usr/local/bin/backup-replica-healthcheck.sh"]
      interval: 5m
      timeout: 10s
      retries: 3
      start_period: 15m
      start_interval: 15s
    restart: unless-stopped

  # 원격 repository의 암호화·무결성을 확인하고 최신 snapshot을 tmpfs에 복원한다.
  backup-replica-verify:
    build:
      context: .
      dockerfile: infrastructure/backup/Dockerfile
    image: family-memory-ai/backup:local
    command: ["replica-verify"]
    profiles: ["offsite-backup-ops"]
    environment: *backup-replica-environment
    tmpfs:
      - /restore
    restart: "no"

  # DB·Docker socket·제품 secret 없이 backup freshness와 host disk 여유만 감시한다.
  # 웹훅 미설정 시에도 측정 상태를 보존하며, URL이 설정되면 같은 receiver로 전이를 전달한다.
  ops-sentinel:
    build:
      context: .
      dockerfile: infrastructure/ops-sentinel/Dockerfile
    image: family-memory-ai/ops-sentinel:local
    environment:
      PIPELINE_ALERT_WEBHOOK_URL: ${PIPELINE_ALERT_WEBHOOK_URL:-}
      PIPELINE_ALERT_WEBHOOK_BEARER_TOKEN: ${PIPELINE_ALERT_WEBHOOK_BEARER_TOKEN:-}
      PIPELINE_ALERT_WEBHOOK_FORMAT: ${PIPELINE_ALERT_WEBHOOK_FORMAT:-generic}
      OPS_SENTINEL_INTERVAL_MS: ${OPS_SENTINEL_INTERVAL_MS:-60000}
      OPS_SENTINEL_REQUEST_TIMEOUT_MS: ${OPS_SENTINEL_REQUEST_TIMEOUT_MS:-5000}
      OPS_SENTINEL_BACKUP_MAX_AGE_SECONDS: ${OPS_SENTINEL_BACKUP_MAX_AGE_SECONDS:-90000}
      OPS_SENTINEL_DISK_MIN_FREE_BYTES: ${OPS_SENTINEL_DISK_MIN_FREE_BYTES:-42949672960}
      OPS_SENTINEL_DISK_MIN_FREE_PERCENT: ${OPS_SENTINEL_DISK_MIN_FREE_PERCENT:-10}
    volumes:
      - type: bind
        source: ${BACKUP_DIR:-./backups}
        target: /monitored/backups
        read_only: true
      - ops-sentinel-state:/state
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    cpus: "0.10"
    mem_limit: 64m
    pids_limit: 64
    healthcheck:
      test: ["CMD", "node", "/app/ops-sentinel.mjs", "healthcheck"]
      interval: 1m
      timeout: 5s
      retries: 3
      start_period: 3m
    networks:
      - alert-egress
    logging: *default-logging
    restart: unless-stopped

  migrate:
    <<: *app-build
    command: pnpm --filter @family/database migrate
    env_file:
      - .env               # 기존 시크릿(DB/JWT/스토리지/AI) 상속
      - .env.production     # prod override(도메인·NODE_ENV·터널 토큰)
    environment:
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # 승인된 training run 한 건만 실행하는 별도 일회성 컨테이너.
  # 운영 API/Worker와 CPU·메모리를 경합하지 않도록 profile과 자원 상한을 둔다.
  trainer:
    <<: *app-build
    command: pnpm --filter @family/trainer start
    profiles: ["training"]
    init: true
    env_file:
      - .env
      - .env.production
    environment:
      NODE_ENV: production
    cpus: "1.0"
    mem_limit: 1g
    pids_limit: 256
    depends_on:
      postgres:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
    restart: "no"

  api:
    <<: *app-build
    command: pnpm --filter @family/api start
    init: true
    env_file:
      - .env               # 기존 시크릿(DB/JWT/스토리지/AI) 상속
      - .env.production     # prod override(도메인·NODE_ENV·터널 토큰)
    environment:
      NODE_ENV: production
    # 포트 미공개: caddy가 내부망으로 프록시
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/v1/health/live').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    logging: *default-logging
    restart: unless-stopped

  worker:
    <<: *app-build
    command: pnpm --filter @family/worker start
    init: true
    env_file:
      - .env               # 기존 시크릿(DB/JWT/스토리지/AI) 상속
      - .env.production     # prod override(도메인·NODE_ENV·터널 토큰)
    environment:
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3002/v1/health/live').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    logging: *default-logging
    restart: unless-stopped

  web:
    <<: *app-build
    command: pnpm --filter @family/web start
    init: true
    env_file:
      - .env               # 기존 시크릿(DB/JWT/스토리지/AI) 상속
      - .env.production     # prod override(도메인·NODE_ENV·터널 토큰)
    environment:
      NODE_ENV: production
      # NEXT_PUBLIC_API_URL은 빌드 타임에 이미 번들에 인라인됨(위 build args).
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    logging: *default-logging
    restart: unless-stopped

  # 내부 리버스 프록시: /v1/* → api, 그 외 → web. 공개 포트 없음(cloudflared가 내부망으로 접근).
  caddy:
    image: *caddy-image
    volumes:
      - ./infrastructure/caddy/Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    logging: *default-logging
    restart: unless-stopped

  # Cloudflare Tunnel: 아웃바운드 연결만 → 공유기 포트 개방 불필요, 공인 IP 비노출.
  # 공개 호스트명 매핑(도메인 → http://caddy:80)은 Cloudflare Zero Trust 대시보드에서 설정.
  cloudflared:
    image: *cloudflared-image
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN:?set in .env.production}
    depends_on:
      - caddy
    logging: *default-logging
    restart: unless-stopped

  # 외형 감시(Gatus): 내부 앱 헬스 + 공개 터널 전체 경로를 능동 점검한다.
  # 설정은 infrastructure/gatus/config.yaml(코드로 관리). 인바운드 포트 미공개 — 모든 점검은 egress.
  gatus:
    image: *gatus-image
    environment:
      # config.yaml의 ${PUBLIC_BASE_URL}, ${GATUS_ALERT_WEBHOOK_URL} 치환에 쓰인다.
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://app.subinary.cloud}
      # 비우면 경보는 비활성, 감시/상태 UI는 그대로 동작. 수신처가 Slack이면 Incoming Webhook URL을 그대로 넣는다.
      GATUS_ALERT_WEBHOOK_URL: ${GATUS_ALERT_WEBHOOK_URL:-}
    volumes:
      - ./infrastructure/gatus/config.yaml:/config/config.yaml:ro
      - gatus-data:/data   # sqlite 업타임/alert 상태 영속화(재시작 시 resolved 누락 방지)
    # depends_on 없음(의도적): 감시자는 감시 대상(api/web)보다 먼저·독립적으로 떠야 한다.
    # api/web에 service_healthy로 묶으면 콜드부트에서 앱이 죽을 때 gatus 자체가 안 떠서
    # 이 서비스가 닫으려던 사각지대가 재현된다. 부팅 중 대상 미준비는 alerting failure-threshold(3회=90s)가 흡수.
    ports:
      # 127.0.0.1에만 바인딩 = 맥 로컬에서만 접근(LAN·인터넷 비노출). 상시 UI는 caddy+Cloudflare Access.
      - "127.0.0.1:8080:8080"
    logging: *default-logging
    restart: unless-stopped

  # Docker socket을 컨테이너에 직접 마운트하지 않기 위한 read-only 프록시.
  # dozzle(및 향후 beszel-agent)은 raw socket 대신 이 프록시를 통해서만 Docker API를 읽는다.
  # POST=0(기본) — 컨테이너 생성/exec/삭제·이미지 빌드·시크릿·소켓 쓰기 전부 차단. GET 조회만 허용.
  # 소켓을 만지는 유일한 지점이며, 전용 internal 네트워크(egress 없음)에 격리한다.
  socket-proxy:
    image: *socket-proxy-image
    environment:
      CONTAINERS: 1   # 목록/inspect/logs/stats (GET)
      INFO: 1
      EVENTS: 1
      PING: 1
      VERSION: 1
      POST: 0         # 명시적으로 쓰기 차단(기본값이지만 의도를 못박는다)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - socket-proxy
    logging: *default-logging
    restart: unless-stopped

  # Dozzle: 전 컨테이너 로그 라이브 뷰/검색. socket을 직접 마운트하지 않고 socket-proxy(tcp) 경유.
  # 전용 internal 망(socket-proxy)에만 둔다 — default 망에 있으면 무인증 :8080이 앱 컨테이너(api/web)에서
  # 도달돼 침해 시 전 스택 로그가 열람되는 lateral 경로가 된다. UI 노출은 caddy 라우팅+Cloudflare Access로 통제.
  dozzle:
    image: *dozzle-image
    environment:
      DOZZLE_REMOTE_HOST: tcp://socket-proxy:2375
      # MCP(/api/mcp)는 현재 소비자가 없어(HolmesGPT는 호스트 docker CLI로 로그를 읽음) 순수 공격표면이라 비활성.
      # AI 에이전트가 실제로 Dozzle MCP를 소비하게 되면 인증/노출 통제와 함께 재활성한다.
      DOZZLE_NO_ANALYTICS: "true"
    depends_on:
      - socket-proxy
    networks:
      # socket-proxy(internal, egress 없음)로 프록시 도달 + observability(non-internal)로 로컬 포트 publish.
      # default 망에는 여전히 안 붙어서 앱 컨테이너(api/web)는 dozzle에 도달 못 함(lateral 로그 열람 차단 유지).
      - socket-proxy
      - observability
    ports:
      # 127.0.0.1 전용. internal 망만으론 host publish가 안 돼 전용 observability 망을 통해 노출.
      - "127.0.0.1:8081:8080"
    logging: *default-logging
    restart: unless-stopped

  # Beszel hub: 시스템 메트릭(CPU/메모리/디스크/온도) 대시보드·경보. 현재 관측의 시계열 공백을 메운다.
  # profiles로 게이트 — 평시 compose up -d에는 안 뜨고 `--profile observability up -d beszel`로만 기동
  # (온보딩이 UI 수동 작업이라 준비만 하고 자동 기동하지 않음. UI 노출·agent 설치는 docs/operations/observability-ui.md).
  # ⚠️ 호스트 실측은 이 컨테이너가 아니라 맥 네이티브 beszel-agent(brew)가 담당(Docker Desktop VM 경계).
  # hub(VM 내부) → 네이티브 agent는 host.docker.internal:45876. 포트 미공개 — UI는 caddy+Cloudflare Access 뒤.
  beszel:
    image: *beszel-image
    profiles: ["observability"]
    environment:
      APP_URL: ${BESZEL_APP_URL:-https://metrics.subinary.cloud}
    volumes:
      - beszel-data:/beszel_data
    extra_hosts:
      - "host.docker.internal:host-gateway"   # 네이티브 agent 접근용(Docker Desktop은 자동이나 명시)
    ports:
      - "127.0.0.1:8090:8090"   # 맥 로컬 전용. 상시 UI는 caddy+Cloudflare Access.
    logging: *default-logging
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  miniodata:
  caddydata:
  caddyconfig:
  backup-replica-state:
  ops-sentinel-state:
  gatus-data:
  beszel-data:

networks:
  alert-egress:
    driver: bridge
  # socket-proxy 전용망: egress 없음(internal). socket 접근 컨테이너를 인터넷에서 격리.
  socket-proxy:
    driver: bridge
    internal: true
  # dozzle의 로컬 포트 publish 전용(non-internal). dozzle만 여기+socket-proxy에 붙어,
  # 앱 컨테이너(default)에서 dozzle 도달은 차단하면서 맥 로컬 UI 접근만 허용한다.
  observability:
    driver: bridge
